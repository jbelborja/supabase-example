events {}

http {
  server {
    listen 8000;

    # GoTrue auth API proxy
    location /auth/v1/ {
      # Intercept OPTIONS (preflight) requests and respond directly with complete CORS headers
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' '$http_access_control_request_headers' always;
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
      }

      # Normal requests pass directly to GoTrue
      proxy_pass         http://auth:9999/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   apikey            $http_apikey;
      proxy_set_header   Authorization     $http_authorization;
    }

    # PostgREST REST API proxy
    location /rest/v1/ {
      # Intercept OPTIONS (preflight) requests and respond directly with complete CORS headers
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' '$http_access_control_request_headers' always;
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
      }

      # Normal requests pass directly to PostgREST
      proxy_pass         http://rest:3000/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   apikey            $http_apikey;
      proxy_set_header   Authorization     $http_authorization;
    }
  }
}
